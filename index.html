<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTZOO — Find it fast, find it now...</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#2D0C57,#4527A0);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
max-width:800px;
padding:20px;
}

h1{
font-size:50px;
font-weight:900;
margin-bottom:10px;
}

h1 span{color:#FFD700;}

p{
color:rgba(255,255,255,0.7);
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
max-width:600px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.15);
}

.card h2{
margin-bottom:10px;
}

.btn{
margin-top:15px;
display:inline-block;
padding:10px 20px;
border-radius:30px;
font-weight:700;
text-decoration:none;
}

.btn1{
background:#FFD700;
color:black;
}

.btn2{
background:white;
color:#2D0C57;
}

footer{
position:absolute;
bottom:20px;
font-size:12px;
color:rgba(255,255,255,0.5);
}

@media(max-width:600px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Welcome to <span>OTZOO<sup>TM</sup></span></h1>
<p>Find it fast, find it now...</p>

<div class="grid">

<div class="card">
<h2>🏪 OTZOO</h2>
<p>Real-time local truth platform</p>
<a href="otzoo.html" class="btn btn1">Open Otzoo</a>
</div>

<div class="card">
<h2>🚆 Otzoo Railway AI</h2>
<p>Smart train tracking & AI predictions</p>
<a href="railway.html" class="btn btn2">Open Otzoo Railway AI</a>
</div>

</div>

</div>

<footer>
© 2026 OTZOO — Made with ❤️ in India
</footer>

</body>
</html>
