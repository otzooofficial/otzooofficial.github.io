<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otzoo Railway AI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(135deg,#2D0C57,#4527A0);
color:white;
text-align:center;
padding:40px 20px;
}

h1 span{color:#FFD700;}

input{
padding:12px;
width:250px;
border-radius:10px;
border:none;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#FFD700;
font-weight:700;
cursor:pointer;
margin-left:10px;
}

.card{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
display:none;
}

.live{
color:#4CAF50;
font-weight:700;
}
</style>
</head>

<body>

<h1>🚆 OTZOO <span>Railway AI</span></h1>
<p>Smart Train Tracking with AI Prediction</p>

<input type="text" id="train" placeholder="Enter Train Number">
<button onclick="checkTrain()">Check Status</button>

<div class="card" id="result">
<h2 id="trainName"></h2>
<p class="live">● Live Status: Running</p>
<p id="delay"></p>
<p id="station"></p>
</div>

<script>
function checkTrain(){
let train = document.getElementById("train").value;

if(train === ""){
alert("Enter train number");
return;
}

// Fake AI data
let delays = ["On Time","5 min late","15 min late","30 min late"];
let stations = ["Next: Delhi","Next: Kanpur","Next: Lucknow","Next: Jaipur"];

let randomDelay = delays[Math.floor(Math.random()*delays.length)];
let randomStation = stations[Math.floor(Math.random()*stations.length)];

document.getElementById("trainName").innerText = "Train: " + train;
document.getElementById("delay").innerText = "AI Prediction: " + randomDelay;
document.getElementById("station").innerText = randomStation;

document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
