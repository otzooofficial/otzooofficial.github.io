<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otzoo Railway AI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Plus Jakarta Sans',sans-serif;
margin:0;
background:linear-gradient(135deg,#2D0C57,#4527A0);
color:white;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
font-weight:900;
}

.hero span{color:#FFD700;}

.hero p{
color:rgba(255,255,255,0.7);
margin:20px 0;
}

/* SEARCH */
.search-box{
margin-top:30px;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:220px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#FFD700;
font-weight:700;
cursor:pointer;
margin-left:10px;
}

/* RESULT */
.result{
display:none;
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
}

/* FEATURES */
.features{
padding:60px 20px;
text-align:center;
background:white;
color:black;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
margin-top:30px;
}

.card{
padding:20px;
border-radius:15px;
background:#F3F4F6;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:12px;
color:rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>🚆 OTZOO <span>Railway AI</span></h1>
<p>Live Train Tracking + AI Prediction</p>

<div class="search-box">
<input type="text" id="train" placeholder="Enter Train Number">
<button onclick="checkTrain()">Check</button>
</div>

<div class="result" id="result">
<h3 id="trainName"></h3>
<p id="delay"></p>
<p id="station"></p>
</div>

</section>

<!-- FEATURES -->
<section class="features">
<h2>Features</h2>

<div class="grid">
<div class="card">🚆 Live Status</div>
<div class="card">⏱ Delay Prediction</div>
<div class="card">📍 Next Station Alert</div>
<div class="card">🧠 AI Intelligence</div>
</div>

</section>

<footer>
© 2026 Otzoo Railway AI
</footer>

<script>
function checkTrain(){
let train = document.getElementById("train").value;

if(train === ""){
alert("Enter train number");
return;
}

let delays = ["On Time","5 min late","15 min late","30 min late"];
let stations = ["Next: Delhi","Next: Kanpur","Next: Lucknow","Next: Jaipur"];

let randomDelay = delays[Math.floor(Math.random()*delays.length)];
let randomStation = stations[Math.floor(Math.random()*stations.length)];

document.getElementById("trainName").innerText = "Train: " + train;
document.getElementById("delay").innerText = "AI Prediction: " + randomDelay;
document.getElementById("station").innerText = randomStation;

document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
