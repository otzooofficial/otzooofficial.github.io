<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Otzoo</title>

  <script>
    const SUPABASE_URL      = 'https://jyptvucebcaoaakthnqt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cHR2dWNlYmNhb2Fha3RobnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTk1NTksImV4cCI6MjA5MDA3NTU1OX0.cNXROvnj4fPErD06Rxi730j4nFb9eN3urEQTXUh41kE';
    const PLAY_STORE_URL    = 'https://play.google.com/store/apps/details?id=com.otzoo.live.otzoo';
    const APP_SCHEME        = 'otzoo://shop/';
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0b0f; --card: #141418; --border: #252530;
      --accent: #6c3fff; --acl: #a78bfa;
      --text: #f1eeff; --muted: #7a7a9a;
      --green: #22c55e; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100svh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px 16px 32px;
    }
    body::before {
      content: ''; position: fixed; top: -25%; left: 50%;
      transform: translateX(-50%); width: 100vw; height: 100vw;
      max-width: 500px; max-height: 500px;
      background: radial-gradient(circle, rgba(108,63,255,.13) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1; background: var(--card);
      border: 1px solid var(--border); border-radius: 22px;
      padding: 28px 24px 24px; width: 100%; max-width: 390px;
      animation: up .45s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes up { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .brand { display:flex; align-items:center; gap:9px; margin-bottom:20px; }
    .brand-mark {
      width:34px; height:34px;
      background: linear-gradient(135deg, var(--accent), var(--acl));
      border-radius:9px; display:grid; place-items:center;
      font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:#fff;
    }
    .brand-text { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; letter-spacing:-.4px; }
    hr { border:none; border-top:1px solid var(--border); margin-bottom:22px; }

    .shop-icon {
      width:64px; height:64px; border-radius:16px;
      background:linear-gradient(135deg,#1c1c28,#252535);
      border:1px solid var(--border); font-size:30px;
      display:grid; place-items:center; margin-bottom:14px;
    }
    .shop-name {
      font-family:'Syne',sans-serif; font-size:24px; font-weight:800;
      letter-spacing:-.7px; line-height:1.15; margin-bottom:6px;
    }
    .shop-cat { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .shop-addr { font-size:12.5px; color:var(--muted); margin-bottom:22px; line-height:1.5; }

    .badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 11px; border-radius:100px;
      font-size:12px; font-weight:600; margin-bottom:8px;
    }
    .badge.open   { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.3); color:var(--green); }
    .badge.closed { background:rgba(239,68,68,.10); border:1px solid rgba(239,68,68,.25); color:var(--red); }
    .dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .badge.open .dot { animation:blink 1.8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }

    .btn {
      display:flex; align-items:center; justify-content:center; gap:9px;
      width:100%; padding:14px 18px; border-radius:13px;
      font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
      text-decoration:none; border:none; cursor:pointer;
      transition:transform .13s, opacity .13s;
    }
    .btn:active { transform:scale(.97); }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--acl)); color:#fff; margin-bottom:10px; }
    .btn-primary:hover { opacity:.9; }
    .btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text); }
    .btn-secondary:hover { background:rgba(255,255,255,.04); }

    .sk {
      background:linear-gradient(90deg,#1e1e28 25%,#26263a 50%,#1e1e28 75%);
      background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px;
    }
    @keyframes shimmer { to{background-position:-200% 0} }

    .state { text-align:center; padding:14px 0 8px; }
    .state .emoji { font-size:44px; margin-bottom:12px; }
    .state h2 { font-family:'Syne',sans-serif; font-size:22px; margin-bottom:7px; }
    .state p  { color:var(--muted); font-size:14px; line-height:1.5; }

    .foot { margin-top:20px; text-align:center; font-size:11.5px; color:var(--muted); }
    .foot a { color:var(--acl); text-decoration:none; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="brand"><div class="brand-mark">O</div><div class="brand-text">Otzoo</div></div>
  <hr />
  <div class="sk" style="width:64px;height:64px;border-radius:16px;margin-bottom:14px"></div>
  <div class="sk" style="width:60%;height:26px;margin-bottom:10px"></div>
  <div class="sk" style="width:38%;height:14px;margin-bottom:16px"></div>
  <div class="sk" style="width:95px;height:24px;border-radius:100px;margin-bottom:22px"></div>
  <div class="sk" style="height:48px;border-radius:13px;margin-bottom:10px"></div>
  <div class="sk" style="height:48px;border-radius:13px;opacity:.55"></div>
</div>

<script>
// ── Language detection ───────────────────────────────────────────────────────
const LANGS = {
  en: {
    open_shop:        '🟢 Open Now',
    closed_shop:      '🔴 Closed Now',
    available_service:'🟢 Available Now',
    unavailable_service:'🔴 Not Available',
    btn_open:         'Open in Otzoo App',
    btn_download:     'Download Otzoo App',
    err_invalid:      'Invalid Link',
    err_invalid_sub:  'Scan a valid Otzoo QR code.',
    err_network:      'Network Error',
    err_network_sub:  'Check internet and try again.',
    err_notfound:     'Not Found',
    err_notfound_sub: 'This shop is not registered on Otzoo.',
    powered:          'Powered by',
  },
  hi: {
    open_shop:        '🟢 Abhi Open Hai',
    closed_shop:      '🔴 Abhi Band Hai',
    available_service:'🟢 Abhi Available Hai',
    unavailable_service:'🔴 Abhi Available Nahi',
    btn_open:         'Otzoo App Mein Dekho',
    btn_download:     'Otzoo Download Karo',
    err_invalid:      'Galat Link',
    err_invalid_sub:  'Sahi Otzoo QR code scan karo.',
    err_network:      'Network Error',
    err_network_sub:  'Internet check karo aur dobara try karo.',
    err_notfound:     'Shop Nahi Mili',
    err_notfound_sub: 'Ye shop Otzoo pe registered nahi hai.',
    powered:          'Powered by',
  },
  fil: {
    open_shop:        '🟢 Bukas Ngayon',
    closed_shop:      '🔴 Sarado Ngayon',
    available_service:'🟢 Available Ngayon',
    unavailable_service:'🔴 Hindi Available',
    btn_open:         'Buksan sa Otzoo App',
    btn_download:     'I-download ang Otzoo',
    err_invalid:      'Di-wastong Link',
    err_invalid_sub:  'Mag-scan ng wastong Otzoo QR code.',
    err_network:      'Error sa Network',
    err_network_sub:  'Suriin ang internet at subukang muli.',
    err_notfound:     'Hindi Nahanap',
    err_notfound_sub: 'Ang tindahang ito ay hindi nakalista sa Otzoo.',
    powered:          'Pinapagana ng',
  },
  id: {
    open_shop:        '🟢 Buka Sekarang',
    closed_shop:      '🔴 Tutup Sekarang',
    available_service:'🟢 Tersedia Sekarang',
    unavailable_service:'🔴 Tidak Tersedia',
    btn_open:         'Buka di Aplikasi Otzoo',
    btn_download:     'Unduh Otzoo',
    err_invalid:      'Tautan Tidak Valid',
    err_invalid_sub:  'Pindai kode QR Otzoo yang valid.',
    err_network:      'Kesalahan Jaringan',
    err_network_sub:  'Periksa internet dan coba lagi.',
    err_notfound:     'Toko Tidak Ditemukan',
    err_notfound_sub: 'Toko ini belum terdaftar di Otzoo.',
    powered:          'Didukung oleh',
  },
};

function getLang() {
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (nav.startsWith('hi'))  return 'hi';
  if (nav.startsWith('fil') || nav.startsWith('tl')) return 'fil';
  if (nav.startsWith('id'))  return 'id';
  return 'en';
}
const T = LANGS[getLang()];

// ── Status text based on entity TYPE ────────────────────────────────────────
function statusText(type, isOpen) {
  const isService = type === 'service' || type === 'home_service';
  if (isService) return isOpen ? T.available_service : T.unavailable_service;
  return isOpen ? T.open_shop : T.closed_shop;
}

// ── Emoji by category ────────────────────────────────────────────────────────
function emojiFor(cat = '') {
  const c = cat.toLowerCase();
  if (c.includes('food') || c.includes('restaurant') || c.includes('dhaba')) return '🍽️';
  if (c.includes('kirana') || c.includes('grocery'))   return '🛒';
  if (c.includes('medical') || c.includes('pharma') || c.includes('clinic')) return '💊';
  if (c.includes('electronic') || c.includes('mobile') || c.includes('computer') || c.includes('laptop')) return '📱';
  if (c.includes('cloth') || c.includes('fashion'))    return '👗';
  if (c.includes('salon') || c.includes('beauty') || c.includes('barber')) return '💇';
  if (c.includes('gym') || c.includes('fitness'))      return '🏋️';
  if (c.includes('book') || c.includes('station'))     return '📚';
  if (c.includes('jewel'))                             return '💍';
  if (c.includes('bakery') || c.includes('sweet') || c.includes('snack')) return '🎂';
  if (c.includes('furniture') || c.includes('carpenter')) return '🪑';
  if (c.includes('hardware'))                          return '🔧';
  if (c.includes('auto') || c.includes('garage'))      return '🚗';
  if (c.includes('cleaning') || c.includes('home'))    return '🧹';
  if (c.includes('coaching') || c.includes('tutor'))   return '📖';
  if (c.includes('lawyer') || c.includes('legal'))     return '⚖️';
  if (c.includes('gardener') || c.includes('garden'))  return '🌿';
  if (c.includes('driver'))                            return '🚗';
  if (c.includes('pg') || c.includes('hostel') || c.includes('flat') || c.includes('house')) return '🏠';
  return '🏪';
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const param = k => new URLSearchParams(location.search).get(k);
const BRAND  = `<div class="brand"><div class="brand-mark">O</div><div class="brand-text">Otzoo</div></div><hr />`;
const FOOT   = `<div class="foot">${T.powered} <a href="https://otzooofficial.github.io">Otzoo</a></div>`;
function render(inner) { document.getElementById('card').innerHTML = BRAND + inner + FOOT; }

function openInApp(id) {
  window.location.href = APP_SCHEME + id;
  setTimeout(() => { window.location.href = PLAY_STORE_URL; }, 1600);
}

// ── Supabase fetch ────────────────────────────────────────────────────────────
async function fetchData(id) {
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  };
  const [eRes, sRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/entities?id=eq.${encodeURIComponent(id)}&select=*&limit=1`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/entity_status_summary?entity_id=eq.${encodeURIComponent(id)}&select=is_open&limit=1`, { headers }),
  ]);
  if (!eRes.ok) throw new Error(`HTTP ${eRes.status}`);
  const entities = await eRes.json();
  const statuses = sRes.ok ? await sRes.json() : [];
  return { entity: entities[0] ?? null, status: statuses[0] ?? null };
}

// ── Main ─────────────────────────────────────────────────────────────────────
(async () => {
  const id = param('id');

  if (!id) {
    render(`<div class="state"><div class="emoji">🔍</div>
      <h2>${T.err_invalid}</h2><p>${T.err_invalid_sub}</p></div>`);
    return;
  }

  let entity, status;
  try {
    ({ entity, status } = await fetchData(id));
  } catch (e) {
    render(`<div class="state"><div class="emoji">⚠️</div>
      <h2>${T.err_network}</h2><p>${T.err_network_sub}</p></div>`);
    return;
  }

  if (!entity) {
    render(`<div class="state"><div class="emoji">😕</div>
      <h2>${T.err_notfound}</h2><p>${T.err_notfound_sub}</p></div>`);
    return;
  }

  const name    = entity.name         ?? 'Unknown';
  const cat     = entity.category     ?? '';
  const subCat  = entity.sub_category ?? '';
  const address = entity.address      ?? entity.location ?? '';
  const type    = entity.type         ?? 'shop';         // shop | service | home_service | property
  const isOpen  = status?.is_open     ?? false;

  const label   = subCat || cat || 'General';
  const emoji   = emojiFor(label);
  const safeName = name.replace(/[<>]/g, '');
  const badgeClass = isOpen ? 'open' : 'closed';
  const badgeText  = statusText(type, isOpen);

  render(`
    <div class="shop-icon">${emoji}</div>
    <div class="shop-name">${safeName}</div>
    <div class="shop-cat">${label}</div>
    <span class="badge ${badgeClass}">
      <span class="dot"></span>${badgeText}
    </span>
    ${address ? `<div class="shop-addr">📍 ${address}</div>` : '<div style="margin-bottom:22px"></div>'}

    <button class="btn btn-primary" onclick="openInApp('${id}')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      ${T.btn_open}
    </button>

    <a class="btn btn-secondary" href="${PLAY_STORE_URL}" target="_blank" rel="noopener">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3.18 23.76a2 2 0 0 0 2.07-.22l11.4-6.58-2.93-2.93-10.54 9.73z
                 M.5 1.05C.19 1.4 0 1.93 0 2.62v18.76c0 .69.19 1.22.5 1.57l.08.08
                 10.5-10.5v-.25L.58.97.5 1.05z
                 M20.34 10.27l-2.99-1.73-3.27 3.27 3.27 3.27 3.01-1.74c.86-.5.86-1.31-.02-1.81z
                 M3.18.24L13.72 6.98 10.79 9.91.25.24A2.08 2.08 0 0 1 3.18.24z"/>
      </svg>
      ${T.btn_download}
    </a>`);
})();
</script>
</body>
</html>
