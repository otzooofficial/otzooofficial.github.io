<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otzoo – Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --card: #18181c;
      --border: #2a2a32;
      --accent: #ff5c2b;
      --accent2: #ffb347;
      --text: #f0ede8;
      --muted: #888;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 20px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vw;
      max-width: 600px;
      max-height: 600px;
      background: radial-gradient(circle, rgba(255,92,43,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px 32px;
      max-width: 400px;
      width: 100%;
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 28px;
    }

    /* Shop info */
    .shop-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1e1e24, #2a2a35);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 18px;
    }

    .shop-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
    }
    .status-badge.open {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
    }
    .status-badge.closed {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-badge.open .status-dot {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    .shop-id {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      border: none;
      outline: none;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      margin-bottom: 12px;
    }
    .btn-primary:hover { opacity: 0.92; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); }

    .btn svg { flex-shrink: 0; }

    /* Loading / Error state */
    .state-msg {
      text-align: center;
      padding: 20px 0 12px;
    }
    .state-msg .emoji { font-size: 40px; margin-bottom: 12px; }
    .state-msg h2 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 6px; }
    .state-msg p  { color: var(--muted); font-size: 14px; line-height: 1.5; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="card" id="card">
  <!-- Injected by JS -->
</div>

<script>
  const APP_SCHEME   = 'otzoo://shop/';          // deep link — change if needed
  const PLAY_STORE   = 'https://play.google.com/store/apps/details?id=com.otzoo.app'; // update with real package

  // ── Fake shop DB (replace with real API later) ──────────────────────────
  const SHOPS = {
    abc123: { name: 'Raj Kirana Store',  emoji: '🛒', open: true  },
    xyz789: { name: 'Sharma Electronics', emoji: '📱', open: false },
    demo:   { name: 'Demo Shop',          emoji: '🏪', open: true  },
  };

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  function render() {
    const card = document.getElementById('card');
    const id   = getParam('id');

    // Brand header — always shown
    const brandHTML = `
      <div class="brand">
        <div class="brand-logo">O</div>
        <div class="brand-name">Otzoo</div>
      </div>
      <hr class="divider" />
    `;

    if (!id) {
      card.innerHTML = brandHTML + `
        <div class="state-msg">
          <div class="emoji">🔍</div>
          <h2>No Shop ID</h2>
          <p>Scan a valid Otzoo QR code<br>to view a shop.</p>
        </div>
        <div class="footer-note">Powered by <a href="https://otzooofficial.github.io">Otzoo</a></div>
      `;
      return;
    }

    const shop = SHOPS[id];

    if (!shop) {
      card.innerHTML = brandHTML + `
        <div class="state-msg">
          <div class="emoji">😕</div>
          <h2>Shop Not Found</h2>
          <p>This shop (<code>${id}</code>) is not registered on Otzoo yet.</p>
        </div>
        <div class="footer-note">Powered by <a href="https://otzooofficial.github.io">Otzoo</a></div>
      `;
      return;
    }

    const statusClass = shop.open ? 'open' : 'closed';
    const statusText  = shop.open ? 'Open Now' : 'Closed';

    card.innerHTML = brandHTML + `
      <div class="shop-icon">${shop.emoji}</div>
      <div class="shop-name">${shop.name}</div>
      <span class="status-badge ${statusClass}">
        <span class="status-dot"></span>${statusText}
      </span>
      <div class="shop-id">ID: ${id}</div>

      <a class="btn btn-primary" id="btnOpen" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        Open in Otzoo App
      </a>

      <a class="btn btn-secondary" href="${PLAY_STORE}" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.18 23.76a2 2 0 0 0 2.07-.22l11.4-6.58-2.93-2.93-10.54 9.73zM.5 1.05C.19 1.4 0 1.93 0 2.62v18.76c0 .69.19 1.22.5 1.57l.08.08 10.5-10.5v-.25L.58.97.5 1.05zM20.34 10.27l-2.99-1.73-3.27 3.27 3.27 3.27 3.01-1.74c.86-.5.86-1.31-.02-1.81v.01zM3.18.24L13.72 6.98l-2.93 2.93L.25.24A2.08 2.08 0 0 1 3.18.24z"/>
        </svg>
        Download Otzoo App
      </a>
      <div class="footer-note">Powered by <a href="https://otzooofficial.github.io">Otzoo</a></div>
    `;

    // Deep link: try app, fall back to Play Store after 1.5s
    document.getElementById('btnOpen').addEventListener('click', function(e) {
      e.preventDefault();
      const deepLink = APP_SCHEME + id;
      window.location.href = deepLink;
      setTimeout(() => {
        // If app not installed, user is still here → send to Play Store
        window.location.href = PLAY_STORE;
      }, 1500);
    });
  }

  render();
</script>
</body>
</html>
